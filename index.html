<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="极简地图">
  <meta name="theme-color" content="#1677ff">
  <title>极简地图</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 顶部搜索栏 -->
  <div class="top-bar">
    <button id="menu-btn" class="btn-icon-bar">☰</button>
    <input type="text" id="search-input" placeholder="搜索地点..." autocomplete="off">
    <button id="search-btn" class="btn-search">搜索</button>
  </div>

  <!-- 搜索/历史/提示面板 -->
  <div id="search-panel" class="search-panel hidden">
    <div class="panel-header">
      <span id="panel-title">搜索</span>
      <button id="close-search" class="btn-close">✕</button>
    </div>
    <div id="search-results"></div>
  </div>

  <!-- 地图 -->
  <div id="map-container"></div>

  <!-- 右下角按钮 -->
  <div class="float-btns">
    <button id="locate-btn" class="btn-float">📍</button>
  </div>

  <!-- 路线选择卡片 -->
  <div id="route-cards" class="route-cards hidden"></div>

  <!-- Key 配置弹窗 -->
  <div id="key-modal" class="modal hidden">
    <div class="modal-content">
      <h2>配置高德地图 Key</h2>
      <p>首次使用需要填入 <a href="https://lbs.amap.com/" target="_blank">高德开放平台</a> 申请的 JS API Key。</p>
      <div class="key-input-group">
        <input type="text" id="key-input" placeholder="高德 JS API Key">
      </div>
      <div class="key-input-group">
        <input type="text" id="security-input" placeholder="安全密钥（可选）">
      </div>
      <button id="save-key" class="btn-primary btn-full">保存并加载</button>
      <p id="key-error" class="error-text"></p>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
