<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="极简地图">
  <meta name="theme-color" content="#3388FF">
  <title>极简地图</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 地图容器 -->
  <div id="map-container"></div>

  <!-- 首页搜索栏（胶囊悬浮） -->
  <div id="home-search" class="home-search">
    <span class="search-icon">🔍</span>
    <span class="search-placeholder">你要去哪里</span>
  </div>

  <!-- 右下角浮动按钮 -->
  <div class="float-btns">
    <button id="traffic-btn" class="btn-float active" title="路况">🚦</button>
    <button id="locate-btn" class="btn-float" title="定位">📍</button>
  </div>

  <!-- 搜索页面（全屏） -->
  <div id="search-page" class="search-page hidden">
    <div class="search-page-top">
      <button id="search-back" class="search-back">←</button>
      <input type="text" id="search-input" placeholder="搜索目的地" autocomplete="off">
      <button id="search-clear-input" class="search-clear-input hidden">✕</button>
    </div>
    <div id="search-body" class="search-body"></div>
  </div>

  <!-- 路线规划页 -->
  <div id="route-page" class="route-page hidden">
    <!-- 顶部起终点 -->
    <div class="route-top">
      <button id="route-back" class="route-back">←</button>
      <div class="route-endpoints">
        <div class="endpoint-row">
          <span class="dot dot-start"></span>
          <span id="route-start-text" class="endpoint-text">我的位置</span>
        </div>
        <div class="endpoint-row">
          <span class="dot dot-end"></span>
          <span id="route-end-text" class="endpoint-text">终点</span>
        </div>
        <button id="swap-btn" class="swap-btn">⇅</button>
      </div>
    </div>
    <!-- 出行方式Tab -->
    <div class="route-modes">
      <label class="route-mode active" data-mode="driving">🚗 驾车</label>
      <label class="route-mode" data-mode="transit">🚌 公交</label>
      <label class="route-mode" data-mode="walking">🚶 步行</label>
      <label class="route-mode" data-mode="riding">🚴 骑行</label>
    </div>
    <!-- 路线卡片区域 -->
    <div id="route-bottom" class="route-bottom">
      <div class="route-loading" id="route-loading">正在规划路线...</div>
      <div id="route-cards" class="route-cards-list"></div>
    </div>
  </div>

  <!-- Key 配置弹窗 -->
  <div id="key-modal" class="modal hidden">
    <div class="modal-content">
      <h2>配置高德地图 Key</h2>
      <p>首次使用需要填入 <a href="https://lbs.amap.com/" target="_blank">高德开放平台</a> 申请的 JS API Key。</p>
      <div class="key-input-group">
        <input type="text" id="key-input" placeholder="高德 JS API Key">
      </div>
      <div class="key-input-group">
        <input type="text" id="security-input" placeholder="安全密钥（可选）">
      </div>
      <button id="save-key" class="btn-primary btn-full">保存并加载</button>
      <p id="key-error" class="error-text"></p>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
